# Phenoscribe configuration

llm:
  provider: "openai"          # openai | anthropic | ollama
  model: "gpt-4o"             # model name for the chosen provider
  ollama_base_url: "http://localhost:11434"  # only used if provider is ollama

transcription:
  backend: "mlx"              # faster-whisper | mlx (Apple Silicon GPU, ~4.5x faster on M1 Pro 16-core)
  model: "large-v3"           # faster-whisper model name, or mlx HF repo. NOTE: distil-* variants are English-only — do not use for French audio
  language: "fr"              # audio language
  device: "cpu"               # cpu | cuda | auto (only used by faster-whisper)

output:
  format: "detailed"          # detailed | semicolon | purl
  path: "output/results.xlsx"

hpo:
  release: "hp/releases/2026-02-16"  # pinned HPO release; must match the obo data-version: header and the Dockerfile HPO_VERSION tag (v2026-02-16)

paths:
  chroma_db: "data/chroma_db"
  jobs_db: "data/jobs.db"
  hpo_obo: "data/hpo/hp.obo"

diarization:
  enabled: false              # enable speaker diarization (requires HF_TOKEN)
  num_speakers: 2             # expected number of speakers (e.g. doctor + patient)
